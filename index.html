<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Satu Rumah KPU Bolmut</title>
  
  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/4/46/KPU_Logo.svg" type="image/svg+xml">
  
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0f172a;
    }
    .app-frame {
      width: 100%;
      height: 100%;
      border: none;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 10;
    }
    .loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }
    .loader {
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-left-color: #ef4444;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .text { color: white; font-family: sans-serif; margin-top: 20px; font-size: 12px; font-weight: bold; letter-spacing: 3px; }
  </style>
</head>
<body>

  <div class="loading-screen">
    <div class="loader"></div>
    <div class="text">MENYAMBUNGKAN KE PORTAL...</div>
  </div>

  <iframe 
  class="app-frame" 
  src="https://script.google.com/macros/s/AKfycbwwTLa3gmOHYSOLupJ76UfJQYYpudmcdd_UXhwqeFoZXM1rhvHF01M0GN6mSJbMuJbr/exec?authuser=0" 
  allow="camera; microphone; fullscreen" 
  allowfullscreen>
</iframe>
</body>
</html>
